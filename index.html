<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>HouseColor</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/mdbassit/Coloris@latest/dist/coloris.min.css"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      display: flex;
      flex-direction: column;
      height: 100dvh;
      background: #1a1a1a;
      font-family: system-ui, -apple-system, sans-serif;
      color: #fff;
    }

    #svg-container {
      flex: 1 1 0;
      min-height: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      padding: 12px 12px 0;
    }

    #svg-container svg {
      max-width: 100%;
      max-height: 100%;
      width: auto;
      height: auto;
      display: block;
    }

    #loading {
      color: #888;
      font-size: 14px;
    }

    #toolbar {
      flex: 0 0 auto;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: center;
      gap: 8px 12px;
      padding: 10px 16px;
      background: #111;
      border-top: 1px solid #2a2a2a;
    }

    .swatch-group {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }

    .swatch-group label {
      font-size: 10px;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      user-select: none;
    }

    .color-input {
      width: 72px;
      height: 28px;
      background: #1e1e1e;
      border: 2px solid #3a3a3a;
      border-radius: 5px;
      color: #ddd;
      font-size: 11px;
      font-family: monospace;
      text-align: center;
      padding: 0 4px 0 24px; /* room for the Coloris swatch on the left */
      outline: none;
      cursor: pointer;
      transition: border-color 0.15s;
    }

    .color-input:hover, .color-input:focus {
      border-color: #666;
      color: #fff;
    }

    /* Coloris dark theme overrides */
    #clr-picker {
      --clr-color-area-height: 140px;
    }

    #copy-btn {
      padding: 8px 14px;
      background: #2563eb;
      color: #fff;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 600;
      white-space: nowrap;
      transition: background 0.15s;
      align-self: center;
    }

    #copy-btn:hover { background: #1d4ed8; }
    #copy-btn.copied { background: #16a34a; }
  </style>
</head>
<body>
  <div id="svg-container">
    <p id="loading">Loading…</p>
  </div>
  <div id="toolbar"></div>

  <script src="https://cdn.jsdelivr.net/gh/mdbassit/Coloris@latest/dist/coloris.min.js"></script>
  <script>
    const PARAM_MAP = [
      { param: 'c1', hex: '2D2D2D', label: 'Glass#' },
      { param: 'c2', hex: '4A4141', label: 'Trim', hidden: true },
      { param: 'c3', hex: '88A6D0', label: 'Accent' },
      { param: 'c4', hex: 'E3D5C7', label: 'Windows' },
      { param: 'c5', hex: 'D9D9D9', label: 'Edges' },
      { param: 'c6', hex: 'EADDD1', label: 'Facade' },
      { param: 'c7', hex: '835822', label: 'Roof' },
      { param: 'c8', hex: 'FFFFFF', label: 'Facade2' },
    ];

    const currentColors = {};
    PARAM_MAP.forEach(({ hex }) => { currentColors[hex] = hex; });

    const groups = {};
    PARAM_MAP.forEach(({ hex }) => { groups[hex] = []; });

    function normHex(fill) {
      if (!fill) return null;
      const f = fill.trim();
      if (f === 'none' || f.startsWith('url(')) return null;
      if (f === 'white') return 'FFFFFF';
      return f.replace('#', '').toUpperCase();
    }

    function applyColor(hexKey, newHex) {
      const normalized = newHex.replace('#', '').toUpperCase();
      currentColors[hexKey] = normalized;
      groups[hexKey].forEach(el => el.setAttribute('fill', '#' + normalized));
    }

    function buildURL() {
      const params = new URLSearchParams();
      PARAM_MAP.forEach(({ param, hex }) => {
        params.set(param, currentColors[hex].toLowerCase());
      });
      return location.origin + location.pathname + '?' + params.toString();
    }

    function readURLParams() {
      const params = new URLSearchParams(location.search);
      PARAM_MAP.forEach(({ param, hex }, i) => {
        const val = params.get(param);
        if (val && /^[0-9a-fA-F]{6}$/.test(val)) {
          applyColor(hex, val);
          const input = document.getElementById('input-' + i);
          if (input) input.value = '#' + val.toLowerCase();
        }
      });
    }

    function buildToolbar() {
      const toolbar = document.getElementById('toolbar');
      toolbar.innerHTML = '';

      PARAM_MAP.forEach(({ hex, label, hidden }, i) => {
        if (hidden) return;
        const group = document.createElement('div');
        group.className = 'swatch-group';

        const lbl = document.createElement('label');
        lbl.textContent = label;
        lbl.htmlFor = 'input-' + i;

        const inp = document.createElement('input');
        inp.type = 'text';
        inp.id = 'input-' + i;
        inp.className = 'color-input';
        inp.value = '#' + currentColors[hex].toLowerCase();
        inp.setAttribute('data-coloris', '');

        // Coloris fires a native 'input' event on the element when color changes
        inp.addEventListener('input', () => {
          applyColor(hex, inp.value);
          history.replaceState(null, '', buildURL());
        });

        group.appendChild(lbl);
        group.appendChild(inp);
        toolbar.appendChild(group);
      });

      const btn = document.createElement('button');
      btn.id = 'copy-btn';
      btn.textContent = 'Copy Link';
      btn.addEventListener('click', () => {
        navigator.clipboard.writeText(buildURL()).then(() => {
          btn.textContent = 'Copied!';
          btn.classList.add('copied');
          setTimeout(() => {
            btn.textContent = 'Copy Link';
            btn.classList.remove('copied');
          }, 1800);
        });
      });
      toolbar.appendChild(btn);

      // Init Coloris after inputs are in the DOM
      Coloris({
        el: '.color-input',
        theme: 'pill',
        themeMode: 'dark',
        format: 'hex',
        swatches: [
          '#2D2D2D','#4A4141','#88A6D0','#E3D5C7',
          '#D9D9D9','#EADDD1','#835822','#FFFFFF',
          '#e63946','#f4a261','#2a9d8f','#457b9d',
          '#1d3557','#f1faee','#a8dadc','#264653',
        ],
      });
    }

    fetch('Asset.svg')
      .then(r => {
        if (!r.ok) throw new Error('Failed to load Asset.svg');
        return r.text();
      })
      .then(svgText => {
        const container = document.getElementById('svg-container');
        container.innerHTML = svgText;

        const svgEl = container.querySelector('svg');
        if (svgEl) {
          svgEl.removeAttribute('width');
          svgEl.removeAttribute('height');
          // Remove the white backdrop rect so colored shapes multiply against the photo
          const firstRect = svgEl.querySelector('rect[fill="white"]');
          if (firstRect) firstRect.remove();
        }

        // Wrap all colored shapes in a <g> with mix-blend-mode: multiply
        const coloredEls = [];
        container.querySelectorAll('path, rect').forEach(el => {
          const key = normHex(el.getAttribute('fill'));
          if (key && groups[key]) {
            groups[key].push(el);
            coloredEls.push(el);
          }
        });

        if (coloredEls.length && svgEl) {
          const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
          g.style.mixBlendMode = 'multiply';
          coloredEls[0].parentNode.insertBefore(g, coloredEls[0]);
          coloredEls.forEach(el => g.appendChild(el));
        }

        buildToolbar();
        readURLParams();
      })
      .catch(err => {
        document.getElementById('loading').textContent = 'Error: ' + err.message;
      });
  </script>
</body>
</html>
